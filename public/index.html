<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickmen Survival</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; background:#1a1a1a; }
  #status { position:fixed; top:10px; left:10px; color:#0f0; font-size:13px; }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<div id="status">connecting...</div>
<script src="/socket.io/socket.io.js"></script>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const socket = io();

  let players = [];
  let myId = null;

  socket.on('connect', () => {
    myId = socket.id;
    statusEl.textContent = 'connected: ' + myId;
  });

  socket.on('players', (list) => {
    players = list;
  });

  socket.on('disconnect', () => {
    statusEl.textContent = 'disconnected';
  });

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    socket.emit('move', { x: e.clientX - rect.left, y: e.clientY - rect.top });
  });

  function drawStickman(x, y, isMe) {
    ctx.strokeStyle = isMe ? '#ffd700' : '#eee';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y - 15, 6, 0, Math.PI * 2);
    ctx.moveTo(x, y - 9);
    ctx.lineTo(x, y + 10);
    ctx.moveTo(x - 8, y);
    ctx.lineTo(x + 8, y);
    ctx.moveTo(x, y + 10);
    ctx.lineTo(x - 7, y + 22);
    ctx.moveTo(x, y + 10);
    ctx.lineTo(x + 7, y + 22);
    ctx.stroke();
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of players) {
      drawStickman(p.x, p.y, p.id === myId);
    }
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
